<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Base property icon: cyan square with arrow -->
  <rect x="3" y="3" width="10" height="10" rx="1" fill="#32B5CC" fill-opacity="0.25"/>
  <rect x="3" y="3" width="10" height="10" rx="1" stroke="#32B5CC" stroke-width="1" fill="none"/>
  <!-- Property arrow indicator -->
  <path d="M6 8H10M10 8L8 6M10 8L8 10" stroke="#32B5CC" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Private padlock overlay (bottom-right, 5x5) -->
  <g transform="translate(11, 11)">
    <!-- Padlock body -->
    <rect x="0" y="2" width="5" height="3" rx="0.5" fill="#F14C4C"/>
