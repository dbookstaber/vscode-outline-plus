<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Base method icon: purple diamond/box shape -->
  <path d="M8 1L14 8L8 15L2 8L8 1Z" fill="#C586C0" fill-opacity="0.25"/>
  <path d="M8 1L14 8L8 15L2 8L8 1Z" stroke="#C586C0" stroke-width="1" fill="none"/>
  <!-- Method indicator -->
  <text x="8" y="10.5" text-anchor="middle" font-family="monospace" font-size="6" fill="#C586C0" font-weight="bold">M</text>
  
  <!-- Static 'S' badge overlay (top-left, 5x5) -->
  <g transform="translate(0, 0)">
    <!-- Badge background circle -->
    <circle cx="2.5" cy="2.5" r="2.5" fill="#3794FF"/>
    <!-- S letter -->
    <text x="2.5" y="4" text-anchor="middle" font-family="sans-serif" font-size="4" fill="white" font-weight="bold">S</text>
  </g>
</svg>
